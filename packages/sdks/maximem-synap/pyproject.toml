[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maximem-synap"
version = "0.2.2"
description = "Python SDK for Synap — persistent memory for AI agents"
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
authors = [
    {name = "Synap Team"}
]
keywords = ["synap", "memory", "context", "ai", "agents", "llm"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "pydantic>=2.0",
    "cryptography>=41.0",
    "httpx>=0.25.0",
    "grpcio>=1.60.0",
    "protobuf>=5.26.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/gauravmaximem/maximem_synap_sdk"
Repository = "https://github.com/gauravmaximem/maximem_synap_sdk"
Issues = "https://github.com/gauravmaximem/maximem_synap_sdk/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["maximem_synap*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 88
target-version = "py39"
