name: Test
on: [push, pull_request]

jobs:
  test-python-sdk:
    name: Test Python SDK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SDK with dev deps
        run: |
          cd packages/maximem-synap
          pip install -e ".[dev]"
      - name: Smoke test imports
        run: |
          cd packages/maximem-synap
          python -c "
          from maximem_synap import MaximemSynapSDK
          from maximem_synap.cache.anticipation_cache import AnticipationCache
          from maximem_synap.cache.bm25 import BM25, tokenize
          from maximem_synap.auth.storage import FileCredentialStorage
          from maximem_synap.models.context import UnifiedContextResponse
          print('Python SDK imports OK')
          "

  test-js-sdk:
    name: Test JavaScript SDK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Verify package structure
        run: |
          cd packages/maximem-synap-js
          node -e "const sdk = require('./src'); console.log('JS SDK exports:', Object.keys(sdk));"

  test-integrations:
    name: Test Integrations
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - synap-langchain
          - synap-llamaindex
          - synap-haystack
          - synap-google-adk
          - synap-autogen
          - synap-semantic-kernel
          - synap-openai-agents
          - synap-pydantic-ai
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - package: synap-crewai
            python-version: "3.10"
          - package: synap-crewai
            python-version: "3.11"
          - package: synap-crewai
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python SDK from local
        run: pip install -e packages/maximem-synap
      - name: Install integration package with dev deps
        run: |
          cd packages/${{ matrix.package }}
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd packages/${{ matrix.package }}
          python -m pytest tests/ -v --tb=short
