name: Test Integrations
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - synap-langchain
          - synap-llamaindex
          - synap-haystack
          - synap-google-adk
          - synap-autogen
          - synap-semantic-kernel
          - synap-openai-agents
          - synap-pydantic-ai
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - package: synap-crewai
            python-version: "3.10"
          - package: synap-crewai
            python-version: "3.11"
          - package: synap-crewai
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SDK from PyPI
        run: pip install maximem-synap>=0.2.0
      - name: Install package with dev deps
        run: |
          cd packages/${{ matrix.package }}
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd packages/${{ matrix.package }}
          python -m pytest tests/ -v --tb=short
