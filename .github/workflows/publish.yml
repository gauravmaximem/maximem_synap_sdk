name: Publish
on:
  push:
    tags:
      - "maximem-synap-v*"       # Python SDK → PyPI
      - "synap-*-v*"              # Python integrations → PyPI
      - "maximem-synap-js-v*"     # JavaScript SDK → npm

jobs:
  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/maximem-synap-v') || (startsWith(github.ref, 'refs/tags/synap-') && !startsWith(github.ref, 'refs/tags/synap-js-'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Determine package from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PACKAGE=$(echo $TAG | sed 's/-v[0-9].*//')
          echo "PACKAGE=$PACKAGE" >> $GITHUB_ENV
      - run: cd packages/$PACKAGE && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/${{ env.PACKAGE }}/dist/

  publish-npm:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/maximem-synap-js-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        run: |
          cd packages/maximem-synap-js
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
